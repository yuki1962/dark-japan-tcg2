<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Japan Battle Series | The Ultimate TCG</title>
    <style>
        :root {
            --black: #050505;
            --blood-red: #8B0000;
            --silver: #C0C0C0;
            --gold: #D4AF37;
        }

        body {
            margin: 0;
            background-color: var(--black);
            color: var(--silver);
            font-family: 'Sawarabi Mincho', serif;
            overflow-x: hidden;
        }

        /* 背景動画セクション */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: brightness(0.4) contrast(1.2);
        }

        .hero-content {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5rem);
            color: white;
            text-shadow: 0 0 20px var(--blood-red);
            letter-spacing: 10px;
            margin-bottom: 0;
        }

        /* カードギャラリー（5枚） */
        .section-title {
            text-align: center;
            padding: 50px 0;
            font-size: 2.5rem;
            color: var(--blood-red);
            text-transform: uppercase;
            letter-spacing: 5px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 0 10%;
        }

        .card {
            background: #111;
            border: 1px solid #333;
            padding: 10px;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: var(--blood-red);
            transform: scale(1.05) rotateY(10deg);
            box-shadow: 0 0 30px var(--blood-red);
        }

        .card img {
            width: 100%;
            filter: grayscale(0.5);
            transition: 0.5s;
        }

        .card:hover img {
            filter: grayscale(0);
        }

        /* 「次はこれ」セクション */
        .coming-soon-card {
            margin: 100px auto;
            max-width: 300px;
            text-align: center;
            opacity: 0.7;
            filter: blur(5px);
            border: 2px dashed var(--blood-red);
            padding: 50px;
        }

        .teaser-text {
            text-align: center;
            font-size: 1.5rem;
            color: var(--gold);
            margin-top: -80px;
            margin-bottom: 100px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* メール登録フォーム */
        .waitlist {
            background: linear-gradient(to bottom, transparent, #1a0000);
            padding: 100px 20px;
            text-align: center;
        }

        input[type="email"] {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--blood-red);
            color: white;
            padding: 10px;
            width: 250px;
            font-size: 1rem;
            outline: none;
        }

        .submit-btn {
            background: var(--blood-red);
            color: white;
            border: none;
            padding: 10px 30px;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.3s;
        }

        .submit-btn:hover {
            background: white;
            color: var(--blood-red);
        }
    </style>
</head>
<body>

    <section class="hero">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
        </video>
        <div class="hero-content">
            <h1>DARK JAPAN</h1>
            <p>BATTLE SERIES</p>
        </div>
    </section>

    <h2 class="section-title">Initial Lineup</h2>
    <div class="card-grid">
        <div class="card"><h3>ONI NINJA</h3><p>SSR</p></div>
        <div class="card"><h3>SAMURAI SPIRIT</h3><p>SR</p></div>
        <div class="card"><h3>OIRAN CURSE</h3><p>SR</p></div>
        <div class="card"><h3>KUMIKO WALL</h3><p>R</p></div>
        <div class="card"><h3>KATANA SLASH</h3><p>C</p></div>
    </div>

    <div class="coming-soon-card">
        <p>? ? ?</p>
    </div>
    <p class="teaser-text">NEXT SHADOW REVEALING SOON...</p>

    <section class="waitlist">
        <h2>JOIN THE DARKNESS</h2>
        <p>Kickstarter開始の通知を最速で受け取る</p>
        <form onsubmit="alert('登録ありがとうございます！闇の世界へようこそ。'); return false;">
            <input type="email" placeholder="Your Email Address" required>
            <button type="submit" class="submit-btn">ACCESS</button>
        </form>
    </section>

    <footer style="text-align: center; padding: 50px; color: #444;">
        &copy; 2026 Dark Japan Battle Series
    </footer>

</body>
</html>
    </script>
</body>
</html>
